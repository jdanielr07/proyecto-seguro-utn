version: '3.9'

services:
  # ─── Base de datos PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: seguro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js + Express ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seguro_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      BCRYPT_ROUNDS: 12
    networks:
      - app_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ─── Nginx (proxy reverso + HTTPS) ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: seguro_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/public:/usr/share/nginx/html:ro
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
