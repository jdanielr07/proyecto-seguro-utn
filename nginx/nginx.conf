events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    keepalive_timeout 65;
    client_max_body_size 50k;

    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin" always;

        # Archivos estáticos (CSS, JS): nginx los sirve directamente.
        # No contienen información sensible ni requieren verificación de sesión.
        location ~* \.(css|js|ico|png|jpg|gif|svg|woff2?|ttf|eot)$ {
            root /usr/share/nginx/html;
            access_log off;
        }

        # Login: rate limiting estricto
        location = /api/auth/login {
            proxy_pass       http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=login burst=3 nodelay;
        }

        # API: rate limiting general
        location /api/ {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=api burst=10 nodelay;
        }

        # Rutas HTML: siempre pasan por el backend para verificación JWT.
        # El backend decide si sirve login.html o index.html según la cookie.
        location / {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=api burst=5 nodelay;
        }
    }
}
